window.kaggle.renderer = async function renderer(context) {
  const {
    act,
    agents,
    environment,
    frame,
    height = 400,
    interactive,
    isInteractive,
    parent,
    step,
    update,
    width = 400,
  } = context;

  // Canvas Setup.
  let canvas = parent.querySelector('canvas');
  if (!canvas) {
    canvas = document.createElement('canvas');
    parent.appendChild(canvas);
  }

  let c = canvas.getContext('2d');
  const size = Math.min(width, height);
  canvas.width = size;
  canvas.height = size;
  c.clearRect(0, 0, canvas.width, canvas.height);

  // Scale from 100x100 game space to canvas size
  const scale = size / 100.0;

  function drawCircle(x, y, r, color, fill = false) {
    c.beginPath();
    c.arc(x * scale, y * scale, r * scale, 0, 2 * Math.PI);
    c.fillStyle = color;
    c.strokeStyle = color;
    c.lineWidth = 2;
    if (fill) {
      c.fill();
    } else {
      c.stroke();
    }
  }

  function drawText(text, x, y, color, size_pt = 12) {
    c.font = `${(size_pt * scale) / 4}px sans-serif`;
    c.fillStyle = color;
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillText(text, x * scale, y * scale);
  }

  // Draw Background (space!)
  c.fillStyle = '#000000';
  c.fillRect(0, 0, canvas.width, canvas.height);

  // Draw Sun
  const sunX = 50 * scale;
  const sunY = 50 * scale;
  const sunR = 10 * scale;
  // Glow effect
  const glow = c.createRadialGradient(sunX, sunY, sunR * 0.5, sunX, sunY, sunR * 2.5);
  glow.addColorStop(0, 'rgba(255, 200, 50, 0.6)');
  glow.addColorStop(0.5, 'rgba(255, 150, 20, 0.2)');
  glow.addColorStop(1, 'rgba(255, 100, 0, 0)');
  c.fillStyle = glow;
  c.fillRect(0, 0, canvas.width, canvas.height);
  // Sun body
  drawCircle(50, 50, 10, '#FFB800', true);
  drawCircle(50, 50, 10, '#FFD700', false);

  const current_step = environment.steps[step];
  const obs = current_step[0].observation;

  // Wong palette — colorblind-safe (blue, vermillion, teal, yellow, neutral grey)
  const colors = ['#0072B2', '#D55E00', '#009E73', '#F0E442', '#888888'];

  // Draw Comet tails (before planets so tails render behind)
  const cometPidSet = new Set(obs.comet_planet_ids || []);
  if (obs.comets) {
    obs.comets.forEach((group) => {
      const idx = group.path_index;
      group.planet_ids.forEach((pid, i) => {
        const path = group.paths[i];
        const tailLen = Math.min(idx + 1, path.length, 3);
        if (tailLen < 2) return;
        for (let t = 1; t < tailLen; t++) {
          const pi = idx - t;
          if (pi < 0) break;
          const alpha = 0.5 * (1 - t / tailLen);
          const x0 = path[pi][0] * scale;
          const y0 = path[pi][1] * scale;
          const x1 = path[pi + 1][0] * scale;
          const y1 = path[pi + 1][1] * scale;
          const width = (3 - (2 * t) / tailLen) * scale;
          c.beginPath();
          c.moveTo(x1, y1);
          c.lineTo(x0, y0);
          c.strokeStyle = `rgba(200, 220, 255, ${alpha})`;
          c.lineWidth = width;
          c.lineCap = 'round';
          c.stroke();
        }
      });
    });
  }

  // Draw Planets
  if (obs.planets) {
    obs.planets.forEach((p) => {
      const id = p[0];
      const owner = p[1];
      const x = p[2];
      const y = p[3];
      const r = p[4];
      const ships = p[5];

      const color = owner === -1 ? colors[4] : colors[owner];

      // Draw planet body (solid fill)
      drawCircle(x, y, r, color, true);
      // Comet border
      if (cometPidSet.has(id)) {
        drawCircle(x, y, r, '#FFFFFF', false);
      }

      // Draw ship count
      drawText(Math.floor(ships).toString(), x, y, '#FFFFFF', 12);
    });
  }

  // Draw Fleets as chevrons pointed in direction of travel
  if (obs.fleets) {
    obs.fleets.forEach((f) => {
      const owner = f[1];
      const x = f[2] * scale;
      const y = f[3] * scale;
      const angle = f[4];
      const ships = f[6];

      const color = colors[owner];
      // Scale chevron size by ship count: log scale, 1 ship = 0.5, 1000 = 3.0
      const sz = (0.5 + (2.5 * Math.log(ships)) / Math.log(1000)) * scale;

      c.save();
      c.translate(x, y);
      c.rotate(angle);

      // Standard chevron shape for all players
      c.beginPath();
      c.moveTo(sz, 0); // tip
      c.lineTo(-sz, -sz * 0.7); // top wing
      c.lineTo(-sz * 0.3, 0); // inner notch
      c.lineTo(-sz, sz * 0.7); // bottom wing
      c.closePath();
      c.fillStyle = color;
      c.fill();

      // Per-player marking lines for colorblind accessibility
      // P0: none, P1: 1 center line, P2: 2 lines (tip-to-wings), P3: 3 lines
      c.strokeStyle = 'rgba(255, 255, 255, 0.55)';
      c.lineWidth = sz * 0.15;
      c.lineCap = 'round';
      if (owner === 1 || owner === 3) {
        // Center line (tip to notch)
        c.beginPath();
        c.moveTo(sz * 0.8, 0);
        c.lineTo(-sz * 0.2, 0);
        c.stroke();
      }
      if (owner === 2 || owner === 3) {
        // Top line (tip toward top wing)
        c.beginPath();
        c.moveTo(sz * 0.6, -sz * 0.15);
        c.lineTo(-sz * 0.7, -sz * 0.5);
        c.stroke();
        // Bottom line (tip toward bottom wing)
        c.beginPath();
        c.moveTo(sz * 0.6, sz * 0.15);
        c.lineTo(-sz * 0.7, sz * 0.5);
        c.stroke();
      }

      c.restore();

      // Draw ship count: north side if fleet is in south half, south side if north
      const labelOffset = f[3] >= 50 ? -3 : 3;
      drawText(ships.toString(), f[2], f[3] + labelOffset, color, 8);
    });
  }

  // Draw Step Info
  c.fillStyle = '#FFFFFF';
  c.font = '16px sans-serif';
  c.textAlign = 'left';
  c.textBaseline = 'top';
  c.fillText(`Step: ${step}`, 10, 10);
};

            if (!ref.current || !animate) return;

            const frame = Math.min((Date.now() - start) / speed, 1);
            if (frame === 1) {
              start = Date.now();
            }

            try {
              await renderer({
                ...context,
                frame,
                height: ref.current.clientHeight,
                width: ref.current.clientWidth,
                hooks: preactHooks,
                parent: ref.current,
                preact,
                styled,
                __mainContext: context,
              });
            } catch (error) {
              if (debug) console.error("Animation render failed:", error);
            }

            animationFrameId.current = requestAnimationFrame(renderAnimation);
          };

          // --- Initial Action ---
          if (animate) {
            // If animate is on, start the animation loop
            renderAnimation();
          } else {
            // Otherwise, just render a single static frame for the current step
            renderStaticFrame();
          }

          // --- Cleanup ---
          return () => {
            observer.disconnect();
            cancelAnimationFrame(animationFrameId.current);
          };
        }, [ref.current, context.step, context.renderer]);

        return h`<div className=${props.className} ref=${ref} />`;
      })`
        align-items: center;
        box-sizing: border-box;
        display: flex;
        height: 100%;
        left: 0;
        justify-content: center;
        position: absolute;
        top: 0;
        width: 100%;
      `;

      const Processing = styled((props) => {
        const { processing } = useContext(Context);
        const text = processing === true ? "Processing..." : processing;
        return h`<div className=${props.className}>${text}</div>`;
      })`
        bottom: 0;
        color: #fff;
        font-size: 12px;
        left: 0;
        line-height: 24px;
        position: absolute;
        text-align: center;
        width: 100%;
      `;

      const Viewer = styled((props) => {
        const { processing } = useContext(Context);
        return h`<div className=${props.className}>
          <${Renderer} />
          ${processing && h`<${Processing} />`}
        </div>`;
      })`
        background-color: #1c1d20;
        display: flex;
        flex: 1;
        overflow: hidden;
        position: relative;
        width: 100%;
      `;

      // Partitions the elements of arr into subarrays of max length num.
      const groupIntoSets = (arr, num) => {
        const sets = [];
        arr.forEach((a) => {
          if (sets.length === 0 || sets[sets.length - 1].length === num) {
            sets.push([]);
          }
          sets[sets.length - 1].push(a);
        });
        return sets;
      };

      // Expects `width` input prop to set proper max-width for agent name span.
      const Legend = styled((props) => {
        const { agents, legend } = useContext(Context);

        const agentPairs = groupIntoSets(
          agents.sort((a, b) => a.index - b.index),
          2,
        );

        return h`<div className=${props.className}>
          ${agentPairs.map(
            (agentList) =>
              h`<ul>
                ${agentList.map(
                  (a) =>
                    h`<li key=${a.id} title="id: ${a.id}" style="color:${a.color || "#FFF"}">
                      ${a.image && h`<img src=${a.image} />`}
                      <span>${a.name}</span>
                    </li>`,
                )}
              </ul>`,
          )}
        </div>`;
      })`
        background-color: #1c1d20;
        font-family: sans-serif;
        font-size: 14px;
        height: 48px;
        width: 100%;

        ul {
          align-items: center;
          display: flex;
          flex-direction: row;
          justify-content: center;
        }

        li {
          align-items: center;
          display: inline-flex;
          transition: color 1s;
        }

        span {
          max-width: ${(p) => (p.width || 400) * 0.5 - 36}px;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        img {
          height: 24px;
          margin-left: 4px;
          margin-right: 4px;
          width: 24px;
        }
      `;

      const StepInput = styled.input.attrs({
        type: "range",
      })`
        appearance: none;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 2px;
        display: block;
        flex: 1;
        height: 4px;
        opacity: 0.8;
        outline: none;
        transition: opacity 0.2s;
        width: 100%;

        &:hover {
          opacity: 1;
        }

        &::-webkit-slider-thumb {
          appearance: none;
          background: #1ebeff;
          border-radius: 100%;
          cursor: pointer;
          height: 12px;
          margin: 0;
          position: relative;
          width: 12px;

          &::after {
            content: "";
            position: absolute;
            top: 0px;
            left: 0px;
            width: 200px;
            height: 8px;
            background: green;
          }
        }
      `;

      const PlayButton = styled.button`
        align-items: center;
        background: none;
        border: none;
        color: white;
        cursor: pointer;
        display: flex;
        flex: 0 0 56px;
        font-size: 20px;
        height: 40px;
        justify-content: center;
        opacity: 0.8;
        outline: none;
        transition: opacity 0.2s;

        &:hover {
          opacity: 1;
        }
      `;

      const StepCount = styled.span`
        align-items: center;
        color: white;
        display: flex;
        font-size: 14px;
        justify-content: center;
        opacity: 0.8;
        padding: 0 16px;
        pointer-events: none;
      `;

      const Controls = styled((props) => {
        const { environment, pause, play, playing, setStep, step } =
          useContext(Context);
        const value = step + 1;
        const onClick = () => (playing ? pause() : play());
        const onInput = (e) => {
          pause();
          setStep(parseInt(e.target.value) - 1);
        };

        return h`
          <div className=${props.className}>
            <${PlayButton} onClick=${onClick}><svg xmlns="http://www.w3.org/2000/svg" width="24px" height="24px" viewBox="0 0 24 24" fill="#FFFFFF">${
              playing
                ? h`<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/><path d="M0 0h24v24H0z" fill="none"/>`
                : h`<path d="M8 5v14l11-7z"/><path d="M0 0h24v24H0z" fill="none"/>`
            }</svg><//>
            <${StepInput} min="1" max=${environment.steps.length} value="${value}" onInput=${onInput} />
            <${StepCount}>${value} / ${environment.steps.length}<//>
          </div>
        `;
      })`
        align-items: center;
        border-top: 4px solid #212121;
        display: flex;
        flex: 0 0 44px;
        width: 100%;
      `;

      const Info = styled((props) => {
        const {
          environment,
          playing,
          step,
          speed,
          animate,
          header,
          controls,
          settings,
        } = useContext(Context);

        return h`
          <div className=${props.className}>
            info:
            step(${step}),
            playing(${playing ? "T" : "F"}),
            speed(${speed}),
            animate(${animate ? "T" : "F"})
          </div>`;
      })`
        color: #888;
        font-family: monospace;
        font-size: 12px;
      `;

      const Settings = styled((props) => {
        const { environment, pause, play, playing, setStep, step } =
          useContext(Context);

        return h`
          <div className=${props.className}>
            <${Info} />
          </div>
        `;
      })`
        background: #fff;
        border-top: 4px solid #212121;
        box-sizing: border-box;
        padding: 20px;
        width: 100%;

        h1 {
          font-size: 20px;
        }
      `;

      const Player = styled((props) => {
        const context = useContext(Context);
        const { agents, controls, header, legend, loading, settings, width } =
          context;
        return h`
          <div className=${props.className}>
            ${loading && h`<${Loading} />`}
            ${!loading && header && h`<${Header} />`}
            ${!loading && h`<${Viewer} />`}
            ${!loading && legend && agents?.length > 0 && h`<${Legend} width=${width}/>`}
            ${!loading && controls && h`<${Controls} />`}
            ${!loading && settings && h`<${Settings} />`}
          </div>`;
      })`
        align-items: center;
        background: #212121;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        height: 100%;
        justify-content: center;
        position: relative;
        width: 100%;
        &:not(.no-border) {
          border: 4px solid #212121;
        }
      `;

      const App = () => {
        const renderCountRef = useRef(0);
        const [_, setRenderCount] = useState(0);

        // These are bindings to the 0-9 keys and are milliseconds of timeout per step
        const speeds = [
          0,
          3000,
          1000,
          500,
          333, // Default
          200,
          100,
          50,
          25,
          10,
        ];

        const contextRef = useRef({
          animate: false,
          agents: [],
          controls: false,
          debug: false,
          environment: { steps: [], info: {} },
          header: window.innerHeight >= 600,
          height: window.innerHeight,
          interactive: false,
          legend: true,
          loading: false,
          playing: false,
          processing: false,
          renderer: () => "DNE",
          settings: false,
          speed: speeds[4],
          step: 0,
          width: window.innerWidth,
        });

        // Context helpers.
        const rerender = (contextRef.current.rerender = () =>
          setRenderCount((renderCountRef.current += 1)));
        const setStep = (contextRef.current.setStep = (newStep) => {
          contextRef.current.step = newStep;
          rerender();
        });
        const setPlaying = (contextRef.current.setPlaying = (playing) => {
          contextRef.current.playing = playing;
          rerender();
        });
        const pause = (contextRef.current.pause = () => setPlaying(false));

        const playNext = () => {
          const context = contextRef.current;

          if (
            context.playing &&
            context.step < context.environment.steps.length - 1
          ) {
            setStep(context.step + 1);
            play(true);
          } else {
            pause();
          }
        };

        const play = (contextRef.current.play = (continuing) => {
          const context = contextRef.current;
          if (context.playing && !continuing) return;
          if (!context.playing) setPlaying(true);
          if (
            !continuing &&
            context.step === context.environment.steps.length - 1
          ) {
            setStep(0);
          }
          setTimeout(playNext, context.speed);
        });

        // Use useState to hold the functions that components will use.
        // We initialize them with the original functions.
        const [playFn, setPlayFn] = useState(() => contextRef.current.play);
        const [pauseFn, setPauseFn] = useState(() => contextRef.current.pause);
        const [stepFn, setStepFn] = useState(() => contextRef.current.setStep);
        const [playingFn, setPlayingFn] = useState(() => contextRef.current.setPlaying);

        const updateContext = (o) => {
          const context = contextRef.current;
          Object.assign(context, o, {
            environment: { ...context.environment, ...(o.environment || {}) },
          });
          rerender();
        };

        contextRef.current.setPlay = setPlayFn;
        contextRef.current.setPause = setPauseFn;
        contextRef.current.setSetStep = setStepFn;
        contextRef.current.setSetPlaying = setPlayingFn;

        // First time setup.
        useEffect(() => {
          // Timeout is used to ensure useEffect renders once.
          setTimeout(() => {
            // Initialize context with window.kaggle.
            updateContext(window.kaggle || {});

            if (window.kaggle?.playing) {
              play(true);
            }

            // Listen for messages received to update the context.
            window.addEventListener(
              "message",
              (event) => {
                // Ensure the environment names match before updating.
                try {
                  if (
                    event.data.environment?.name ==
                      contextRef.current.environment.name ||
                    (event.data.environment?.name &&
                      !contextRef.current.environment.name) ||
                    event.data.environment?.loading !==
                      contextRef.current.environment.loading
                  ) {
                    const nextContext = {
                      ...event.data,
                      environment: {
                        ...event.data.environment,
                        steps: event.data.environment?.steps ?? [],
                      },
                    };
                    if (
                      !nextContext.renderer ||
                      typeof nextContext.renderer !== "function"
                    ) {
                      nextContext.renderer = contextRef.current.renderer;
                    }
                    window.kaggle = nextContext;
                    updateContext(nextContext);
                  }
                  if (event.data.setSteps) {
                    const nextContext = {
                      ...(window.kaggle ?? {}),
                      environment: {
                        ...(window.kaggle?.environment ?? {}),
                        steps: event.data.setSteps,
                      },
                    };
                    if (
                      !nextContext.renderer ||
                      typeof nextContext.renderer !== "function"
                    ) {
                      nextContext.renderer = contextRef.current.renderer;
                    }

                    window.kaggle = nextContext;
                    updateContext(nextContext);
                  }

                  // Side load the renderer script if it is specified by the post message event and not already loaded.
                  const renderScriptId = "rendererScript";
                  if (
                    event.data.environment?.rendererUrl &&
                    !document.querySelector(`#${renderScriptId}`)
                  ) {
                    window.rendererUrl = event.data.environment?.rendererUrl;
                    const script = document.createElement("script");
                    script.id = renderScriptId;
                    script.onload = () => {
                      window.kaggle.renderer = window.renderer;
                    };
                    script.src = window.rendererUrl;
                    document.body.appendChild(script);
                  }
                } catch {}
              },
              false,
            );
            // Listen for keyboard commands.
            window.addEventListener(
              "keydown",
              (event) => {
                const {
                  interactive,
                  isInteractive,
                  playing,
                  step,
                  environment,
                } = contextRef.current;
                const key = event.keyCode;
                const zero_key = 48;
                const nine_key = 57;
                if (
                  interactive ||
                  isInteractive() ||
                  (key !== 32 &&
                    key !== 37 &&
                    key !== 39 &&
                    !(key >= zero_key && key <= nine_key))
                )
                  return;

                if (key === 32) {
                  playing ? pause() : play();
                } else if (key === 39) {
                  contextRef.current.playing = false;
                  if (step < environment.steps.length - 1) setStep(step + 1);
                  rerender();
                } else if (key === 37) {
                  contextRef.current.playing = false;
                  if (step > 0) setStep(step - 1);
                  rerender();
                } else if (key >= zero_key && key <= nine_key) {
                  contextRef.current.speed = speeds[key - zero_key];
                }
                event.preventDefault();
                return false;
              },
              false,
            );
          }, 1);
        }, []);

        if (contextRef.current.debug) {
          console.log("context", contextRef.current);
        }

        // Ability to update context.
        contextRef.current.update = updateContext;

        // Ability to communicate with ipython.
        const execute = (contextRef.current.execute = (source) =>
          new Promise((resolve, reject) => {
            try {
              window.parent.IPython.notebook.kernel.execute(source, {
                iopub: {
                  output: (resp) => {
                    const type = resp.msg_type;
                    if (type === "stream") return resolve(resp.content.text);
                    if (type === "error") return reject(new Error(resp.evalue));
                    return reject(new Error("Unknown message type: " + type));
                  },
                },
              });
            } catch (e) {
              reject(new Error("IPython Unavailable: " + e));
            }
          }));

        // Ability to return an action from an interactive session.
        contextRef.current.act = (action) => {
          const id = contextRef.current.environment.id;
          updateContext({ processing: true });
          execute(`
            import json
            from kaggle_environments import interactives
            if "${id}" in interactives:
                action = json.loads('${JSON.stringify(action)}')
                env, trainer = interactives["${id}"]
                trainer.step(action)
                print(json.dumps(env.steps))`)
            .then((resp) => {
              try {
                updateContext({
                  processing: false,
                  environment: { steps: JSON.parse(resp) },
                });
                play();
              } catch (e) {
                updateContext({ processing: resp.split("\n")[0] });
                console.error(resp, e);
              }
            })
            .catch((e) => console.error(e));
        };

        // Check if currently interactive.
        contextRef.current.isInteractive = () => {
          const context = contextRef.current;
          const steps = context.environment.steps;
          return (
            context.interactive &&
            !context.processing &&
            context.step === steps.length - 1 &&
            steps[context.step].some((s) => s.status === "ACTIVE")
          );
        };

        // Create a new value object on every render.
        // This object includes the *current* play/pause functions from useState.
        const providerValue = { ...contextRef.current, play: playFn, pause: pauseFn, setStep: stepFn, setPlaying: playingFn };

        return h`
          <${Context.Provider} value=${providerValue}>
            <${Player} className="${contextRef.current.environment.viewer ? "no-border" : ""}" />
          <//>`;
      };

      preact.render(h`<${App} />`, document.body);
    </script>
  </body>
</html>
